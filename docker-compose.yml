version: '3.8'

services:
  auth-service:
    build: ./auth-service
    ports:
      - "8000:8000"
    networks:
      - security-network
    env_file:
    - .env

  event-service:
    build: ./event-service
    ports:
      - "8001:8001"
    networks:
      - security-network
    env_file:
    - .env

  alert-service:
    build: ./alert-service
    ports:
      - "8002:8002"
    networks:
      - security-network
    env_file:
    - .env

  postgres-auth:
    image: postgres:15
    environment:
      - POSTGRES_USER=auth
      - POSTGRES_PASSWORD=auth123
      - POSTGRES_DB=authdb
    networks:
      - security-network
networks:
  security-network: