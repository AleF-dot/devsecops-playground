version: '3.8'

services:
  auth-service:
    build: ./auth-service
    ports:
      - "8000:8000"
    networks:
      - security-network
    env_file:
    - .env
    depends_on:
      postgres-auth:
        condition: service_healthy

  event-service:
    build: ./event-service
    ports:
      - "8001:8001"
    networks:
      - security-network
    env_file:
    - .env

  alert-service:
    build: ./alert-service
    ports:
      - "8002:8002"
    networks:
      - security-network
    env_file:
    - .env

  postgres-auth:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - security-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  security-network: